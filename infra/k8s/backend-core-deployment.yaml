apiVersion: apps/v1
kind: Deployment
metadata:
  name: codexforge-backend-core
  namespace: codexforge
  labels:
    app: codexforge-backend-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codexforge-backend-core
  template:
    metadata:
      labels:
        app: codexforge-backend-core
    spec:
      containers:
      - name: backend-core
        image: codexforge/backend-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: codexforge-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://codexforge-redis:6379"
        - name: AGENT_URL
          value: "http://codexforge-backend-agent:8000"
        resources:
          limits:
            cpu: "1"
            memory: 1.5Gi
          requests:
            cpu: 250m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: codexforge-backend-core
  namespace: codexforge
  labels:
    app: codexforge-backend-core
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: codexforge-backend-core
