apiVersion: apps/v1
kind: Deployment
metadata:
  name: codexforge-frontend
  namespace: codexforge
  labels:
    app: codexforge-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codexforge-frontend
  template:
    metadata:
      labels:
        app: codexforge-frontend
    spec:
      containers:
      - name: frontend
        image: codexforge/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://codexforge-backend-core:3001"
        - name: NEXT_PUBLIC_AGENT_URL
          value: "http://codexforge-backend-agent:8000"
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: codexforge-frontend
  namespace: codexforge
  labels:
    app: codexforge-frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: codexforge-frontend
