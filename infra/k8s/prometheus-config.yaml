apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: codexforge
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'codexforge-backend-agent'
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: 'codexforge-backend-agent'
            action: keep
          - source_labels: [__meta_kubernetes_service_port_number]
            regex: '8000'
            action: keep
