apiVersion: v1
kind: ConfigMap
metadata:
  name: mig-partman-config
  namespace: gpu-operator
data:
  default-mig-config: |
    version: v1
    mig-configs:
      # Mixed partitioning for H100 (80GB VRAM): 2x 2g.20gb and 4x 1g.10gb profiles
      all-h100-mixed:
        - devices: all
          mig-enabled: true
          mig-devices:
            "1g.10gb": 4
            "2g.20gb": 2
      # Maximum slicing for H100: 7x 1g.10gb profiles for high-concurrency developer sessions
      all-h100-1g-10gb:
        - devices: all
          mig-enabled: true
          mig-devices:
            "1g.10gb": 7
      # Balanced profile partitioning: 2x 2g.20gb and 1x 3g.40gb profiles
      all-h100-balanced:
        - devices: all
          mig-enabled: true
          mig-devices:
            "2g.20gb": 2
            "3g.40gb": 1
