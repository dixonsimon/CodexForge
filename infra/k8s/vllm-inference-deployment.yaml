apiVersion: apps/v1
kind: Deployment
metadata:
  name: codexforge-vllm-inference
  namespace: codexforge
  labels:
    app: codexforge-vllm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codexforge-vllm-inference
  template:
    metadata:
      labels:
        app: codexforge-vllm-inference
    spec:
      containers:
      - name: vllm-inference
        image: vllm/vllm-openai:latest
        imagePullPolicy: IfNotPresent
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model"
        - "Qwen/Qwen2.5-Coder-7B-Instruct"
        - "--port"
        - "8000"
        - "--gpu-memory-utilization"
        - "0.90"
        - "--max-model-len"
        - "4096"
        ports:
        - containerPort: 8000
          name: http
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: 32Gi
            cpu: "8"
          requests:
            nvidia.com/gpu: "1"
            memory: 16Gi
            cpu: "4"
        securityContext:
          capabilities:
            add: ["SYS_PTRACE"]
        tolerations:
        - key: "sku"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        nodeSelector:
          accelerator: nvidia-h100
---
apiVersion: v1
kind: Service
metadata:
  name: codexforge-vllm-inference
  namespace: codexforge
  labels:
    app: codexforge-vllm-inference
spec:
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: codexforge-vllm-inference
