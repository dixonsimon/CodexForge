apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: codexforge-redis
  namespace: codexforge
  labels:
    app: codexforge-redis
spec:
  serviceName: codexforge-redis
  replicas: 1
  selector:
    matchLabels:
      app: codexforge-redis
  template:
    metadata:
      labels:
        app: codexforge-redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        imagePullPolicy: IfNotPresent
        command:
        - redis-server
        - --appendonly
        - "yes"
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: codexforge-redis
  namespace: codexforge
  labels:
    app: codexforge-redis
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: codexforge-redis
